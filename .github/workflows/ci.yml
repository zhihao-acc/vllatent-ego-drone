name: ci

# Env-split honest CI: lint + types + the PURE-tier import smoke/unit tests + the
# blob guard. NO torch, transformers, timm, AirSim, GPU, weights, or sibling repos.
# Torch/model/training and simulator/integration tiers are exercised locally or
# in explicitly user-gated environments, never in this job.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint/type + PURE runtime deps (no torch, no transformers, no timm, no airsim)
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy types-PyYAML pyyaml numpy pytest

      - name: Pre-commit blob guard
        run: ALL=1 bash scripts/check_no_blobs.sh

      - name: Ruff lint
        run: ruff check .

      - name: Mypy (HARD gate on the PURE tier)
        run: mypy vllatent/schemas.py vllatent/actions.py vllatent/frames.py vllatent/config.py vllatent/manifest.py vllatent/audit.py

      - name: Import smoke (PURE tier — numpy/pyyaml only)
        run: |
          python -c "import vllatent.schemas"
          python -c "import vllatent.actions"
          python -c "import vllatent.frames"
          python -c "import vllatent.config"
          python -c "import vllatent.manifest"
          python -c "import vllatent.audit"

      - name: Cache-manifest CLI round-trip
        run: python -m vllatent.manifest --emit-empty | python -m vllatent.manifest --validate -

      - name: Pure unit tests (torch/sim-marked tests deselected)
        run: pytest -q -m "not torch and not sim"

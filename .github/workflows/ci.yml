name: ci

# Env-split honest CI: lint + types + the PURE-tier import smoke/unit tests + the
# blob guard. NO torch, transformers, timm, bpy, GPU, weights, or sibling repos.
# Torch/model/training and Blender integration are exercised only under their
# separately authorized local gates.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint/type + PURE runtime deps (no torch, no transformers, no timm, no bpy)
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy types-PyYAML pyyaml numpy pytest

      - name: Pre-commit blob guard
        run: ALL=1 bash scripts/check_no_blobs.sh

      - name: Ruff lint
        run: ruff check .

      - name: Mypy (HARD gate on the PURE tier)
        run: mypy vllatent/schemas.py vllatent/config.py vllatent/manifest.py vllatent/ingest/quality.py vllatent/ingest/ego_motion.py vllatent/sim

      - name: Import smoke (PURE tier — numpy/pyyaml only)
        run: |
          python -c "import vllatent.schemas"
          python -c "import vllatent.config"
          python -c "import vllatent.manifest"
          python -c "import vllatent.ingest.quality"
          python -c "import vllatent.ingest.ego_motion"
          python -c "import vllatent.sim.contracts"
          python -c "import vllatent.sim.frames"
          python -c "import vllatent.sim.skier"
          python -c "import vllatent.sim.skier_audit"
          python -c "import vllatent.sim.skier_fixtures"
          python -c "import vllatent.sim.rig"
          python -c "import vllatent.sim.pose"
          python -c "import vllatent.sim.labels"
          python -c "import vllatent.sim.scene"

      - name: Cache-manifest CLI round-trip
        run: python -m vllatent.manifest --emit-empty | python -m vllatent.manifest --validate -

      - name: Pure unit tests (torch-marked tests deselected)
        run: pytest -q -m "not torch"

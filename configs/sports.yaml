# Sports-following pipeline config override (Phase B1).
# Activates the sports section in Config; AerialVLN sections keep defaults.
sports:
  name: sports_following
  sport: skiing
  target_fps: 5.0
  min_clip_seconds: 10.0
  max_clip_seconds: 120.0
  resolution_h: 720
  resolution_w: 1280
  quality_threshold: 0.3
